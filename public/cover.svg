<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#0C111D"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1D2939" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C111D" stop-opacity="0"/>
      <stop offset="1" stop-color="#0C111D" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00FFA7" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00FFA7" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#00FFA7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#grid)"/>
  <rect x="0" y="300" width="1200" height="100" fill="url(#fade)"/>

  <!-- Green glow -->
  <ellipse cx="600" cy="200" rx="400" ry="150" fill="url(#glow)"/>

  <!-- Logo text -->
  <text x="600" y="175" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="72" font-weight="800" letter-spacing="-2">
    <tspan fill="#00FFA7">Open</tspan><tspan fill="#F9FAFB">Claude</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="220" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="20" fill="#667085" font-weight="400">
    The open source operating system for AI-powered businesses
  </text>

  <!-- Badges row -->
  <!-- Agents -->
  <rect x="270" y="260" width="100" height="30" rx="15" fill="#00FFA7" fill-opacity="0.1" stroke="#00FFA7" stroke-opacity="0.3" stroke-width="1"/>
  <text x="320" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#00FFA7" font-weight="600">9 Agents</text>

  <!-- Skills -->
  <rect x="390" y="260" width="110" height="30" rx="15" fill="#00FFA7" fill-opacity="0.1" stroke="#00FFA7" stroke-opacity="0.3" stroke-width="1"/>
  <text x="445" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#00FFA7" font-weight="600">126 Skills</text>

  <!-- Routines -->
  <rect x="520" y="260" width="130" height="30" rx="15" fill="#00FFA7" fill-opacity="0.1" stroke="#00FFA7" stroke-opacity="0.3" stroke-width="1"/>
  <text x="585" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#00FFA7" font-weight="600">27 Routines</text>

  <!-- Dashboard -->
  <rect x="670" y="260" width="120" height="30" rx="15" fill="#00FFA7" fill-opacity="0.1" stroke="#00FFA7" stroke-opacity="0.3" stroke-width="1"/>
  <text x="730" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#00FFA7" font-weight="600">Web Dashboard</text>

  <!-- MIT -->
  <rect x="810" y="260" width="110" height="30" rx="15" fill="#00FFA7" fill-opacity="0.1" stroke="#00FFA7" stroke-opacity="0.3" stroke-width="1"/>
  <text x="865" y="280" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#00FFA7" font-weight="600">MIT License</text>

  <!-- Bottom bar -->
  <rect x="0" y="395" width="1200" height="5" fill="#00FFA7" fill-opacity="0.6"/>

  <!-- By Evolution Foundation -->
  <text x="600" y="345" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="500">
    <tspan fill="#667085">by </tspan>
    <tspan fill="#00FFA7" font-weight="700">Evolution Foundation</tspan>
    <tspan fill="#667085">  ·  Built with </tspan>
    <tspan fill="#D0D5DD" font-weight="600">Claude Code</tspan>
  </text>
</svg>
